version: "3.9"

services:
  # ── PostgreSQL con pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pathos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pathos_db
      POSTGRES_USER: pathos
      POSTGRES_PASSWORD: pathos_pass
    ports:
      - "5432:5432"
    volumes:
      - pathos_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathos -d pathos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery queue) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pathos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pathos_redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_pass
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI App ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathos_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pathos:pathos_pass@postgres:5432/pathos_db
      DATABASE_URL_SYNC: postgresql://pathos:pathos_pass@postgres:5432/pathos_db
      REDIS_URL: redis://:redis_pass@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app   # hot-reload en desarrollo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (ingestión async) ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathos_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pathos:pathos_pass@postgres:5432/pathos_db
      REDIS_URL: redis://:redis_pass@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker worker --loglevel=info --concurrency=4

  # ── pgAdmin (solo desarrollo) ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pathos_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pathos.local
      PGADMIN_DEFAULT_PASSWORD: pgadmin_pass
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev     # solo se inicia con: docker-compose --profile dev up

volumes:
  pathos_pgdata:
  pathos_redis_data:

networks:
  default:
    name: pathos_network
